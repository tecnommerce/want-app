<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Conectamos compradores con vendedores 🤝 Simple. Rápido. Want.">
    <title>Want | Pedidos simples a tus negocios favoritos</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Want">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Want<span class="logo-dot">.</span></a>
                
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Buscar negocios..." id="search-input">
                    </div>
                </div>

                <div class="nav-desktop">
                    <a href="#contacto" class="nav-link" id="contacto-link">Contacto</a>
                    <div class="social-icons">
                        <a href="https://instagram.com/tu_usuario" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                        <a href="https://facebook.com/tu_pagina" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                        <a href="https://wa.me/tu_numero" target="_blank" class="social-icon"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>

                <button class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Menú móvil -->
    <div class="mobile-menu" id="mobile-menu">
        <button class="menu-close" id="menu-close">
            <i class="fas fa-times"></i>
        </button>
        <div class="mobile-nav">
            <a href="#contacto" class="mobile-nav-link" id="contacto-link-mobile">Contacto</a>
            <a href="#" class="mobile-nav-link" id="install-app-link" style="display: none;">
                <i class="fas fa-download"></i> Instalar App
            </a>
        </div>
        <div class="mobile-social">
            <a href="https://instagram.com/tu_usuario" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="https://facebook.com/tu_pagina" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            <a href="https://wa.me/tu_numero" target="_blank" class="social-icon"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
    <div class="menu-overlay" id="menu-overlay"></div>

    <main>
        <section class="hero">
            <div class="container">
                <h2>¿Qué querés pedir hoy?</h2>
                <p>Conectamos compradores con vendedores 🤝 Simple. Rápido. Want.</p>
            </div>
        </section>

        <section class="negocios-section">
            <div class="container">
                <div class="negocios-grid" id="negocios-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando negocios...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <section class="contacto-section" id="contacto-section" style="display: none;">
        <div class="container">
            <h2>Contacto</h2>
            <div class="contacto-info">
                <p><i class="fas fa-envelope"></i> hola@want.com.ar</p>
                <p><i class="fab fa-whatsapp"></i> +54 9 11 1234-5678</p>
                <div class="social-icons" style="justify-content: center; margin-top: 20px;">
                    <a href="https://instagram.com/tu_usuario" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                    <a href="https://facebook.com/tu_pagina" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://wa.me/tu_numero" target="_blank" class="social-icon"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Want - Pedidos simples y rápidos</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/home.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ Service Worker registrado'))
                .catch(err => console.error('❌ Service Worker error:', err));
        }
        
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installLink = document.getElementById('install-app-link');
            if (installLink) installLink.style.display = 'flex';
        });
        
        window.installApp = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('App instalada');
                    }
                    deferredPrompt = null;
                    const installLink = document.getElementById('install-app-link');
                    if (installLink) installLink.style.display = 'none';
                });
            }
        };
        
        document.getElementById('install-app-link')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.installApp();
        });
    </script>
</body>
</html>
