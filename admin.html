<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Want | Panel de Vendedor</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='70' font-weight='bold' text-anchor='middle' fill='%23FF5A00' font-family='system-ui, -apple-system, sans-serif'%3EW%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='70' font-weight='bold' text-anchor='middle' fill='%23FF5A00' font-family='system-ui, -apple-system, sans-serif'%3EW%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header solo visible después de login -->
    <header class="header header-admin" id="header-admin" style="display: none;">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Want<span class="logo-dot">.</span></a>
                <div class="header-actions">
                    <button class="menu-toggle-admin" id="menu-toggle-admin">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Menú móvil para admin (solo después de login) -->
    <div class="mobile-menu-admin" id="mobile-menu-admin" style="display: none;">
        <button class="menu-close" id="menu-close-admin">
            <i class="fas fa-times"></i>
        </button>
        <div class="mobile-nav-admin">
            <button class="mobile-tab-btn active" data-tab="pedidos">
                <i class="fas fa-box"></i> Pedidos
            </button>
            <button class="mobile-tab-btn" data-tab="productos">
                <i class="fas fa-pizza-slice"></i> Productos
            </button>
            <button class="mobile-tab-btn" data-tab="perfil">
                <i class="fas fa-user-circle"></i> Perfil
            </button>
            <button class="mobile-logout-btn" id="mobile-logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar sesión
            </button>
        </div>
    </div>
    <div class="menu-overlay-admin" id="menu-overlay-admin" style="display: none;"></div>

    <main>
        <div class="container">
            <!-- Panel de autenticación -->
            <div class="admin-auth" id="admin-auth">
                <!-- Botón volver atrás (solo en autenticación) -->
                <button class="btn-back" id="btn-back" onclick="window.location.href='index.html'">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
                
                <div class="auth-card">
                    <div class="auth-logo">
                        <h1 class="auth-logo-text">Want<span class="logo-dot">.</span></h1>
                        <p class="auth-subtitle">Panel de vendedores</p>
                    </div>
                    
                    <!-- Login Panel (visible por defecto) -->
                    <div class="auth-panel active" id="login-panel">
                        <form id="login-form">
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" id="login-email" placeholder="tu@email.com" required>
                            </div>
                            <div class="form-group password-group">
                                <label><i class="fas fa-lock"></i> Contraseña</label>
                                <div class="password-wrapper">
                                    <input type="password" id="login-password" placeholder="••••••••" required>
                                    <button type="button" class="toggle-password" data-target="login-password">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group remember-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="remember-me"> Recordarme
                                </label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">
                                <i class="fas fa-sign-in-alt"></i> Ingresar
                            </button>
                        </form>
                        
                        <div class="auth-divider">
                            <span>¿No tenés cuenta?</span>
                        </div>
                        
                        <button class="btn btn-outline btn-block" id="btn-show-register">
                            <i class="fas fa-user-plus"></i> Registrarse
                        </button>
                        
                        <div class="auth-links">
                            <button class="link-btn" id="btn-show-recover">¿Olvidaste tu contraseña?</button>
                        </div>
                    </div>

                    <!-- Register Panel (oculto inicialmente) -->
                    <div class="auth-panel" id="register-panel" style="display: none;">
                        <button class="back-to-login" id="back-to-login">
                            <i class="fas fa-arrow-left"></i> Volver al inicio
                        </button>
                        
                        <form id="register-form">
                            <div class="form-row">
                                <div class="form-group half">
                                    <label><i class="fas fa-store"></i> Nombre del negocio *</label>
                                    <input type="text" id="reg-nombre" placeholder="Ej: Pizzería Don Juan" required>
                                </div>
                                <div class="form-group half">
                                    <label><i class="fas fa-envelope"></i> Email *</label>
                                    <input type="email" id="reg-email" placeholder="tu@email.com" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group half">
                                    <label><i class="fab fa-whatsapp"></i> Teléfono *</label>
                                    <input type="tel" id="reg-telefono" placeholder="5491112345678" required>
                                </div>
                                <div class="form-group half">
                                    <label><i class="fas fa-map-marker-alt"></i> Dirección *</label>
                                    <input type="text" id="reg-direccion" placeholder="Calle, número" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-clock"></i> Horario de atención</label>
                                <input type="text" id="reg-horario" placeholder="Ej: Lun a Dom 18-24hs">
                            </div>
                            <div class="form-row">
                                <div class="form-group half">
                                    <label><i class="fas fa-lock"></i> Contraseña *</label>
                                    <div class="password-wrapper">
                                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
                                        <button type="button" class="toggle-password" data-target="reg-password">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="form-group half">
                                    <label><i class="fas fa-lock"></i> Confirmar *</label>
                                    <div class="password-wrapper">
                                        <input type="password" id="reg-password2" placeholder="Repetir contraseña" required>
                                        <button type="button" class="toggle-password" data-target="reg-password2">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">
                                <i class="fas fa-user-plus"></i> Registrarse
                            </button>
                        </form>
                    </div>

                    <!-- Recover Panel (oculto inicialmente) -->
                    <div class="auth-panel" id="recover-panel" style="display: none;">
                        <button class="back-to-login" id="back-to-login-recover">
                            <i class="fas fa-arrow-left"></i> Volver al inicio
                        </button>
                        
                        <form id="recover-form">
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" id="recover-email" placeholder="tu@email.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">
                                <i class="fas fa-paper-plane"></i> Enviar código
                            </button>
                        </form>
                        <div id="recover-code-section" style="display: none; margin-top: 20px;">
                            <div class="form-group">
                                <label><i class="fas fa-key"></i> Código de recuperación</label>
                                <input type="text" id="recover-code" placeholder="Código de 6 dígitos">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Nueva contraseña</label>
                                <div class="password-wrapper">
                                    <input type="password" id="recover-new-password" placeholder="Mínimo 6 caracteres">
                                    <button type="button" class="toggle-password" data-target="recover-new-password">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Confirmar</label>
                                <div class="password-wrapper">
                                    <input type="password" id="recover-new-password2" placeholder="Repetir contraseña">
                                    <button type="button" class="toggle-password" data-target="recover-new-password2">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <button class="btn btn-primary btn-block" id="btn-reset-password">
                                <i class="fas fa-save"></i> Restablecer
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Panel principal (oculto inicialmente) -->
            <div class="admin-panel" id="admin-panel" style="display: none;">
                <div class="panel-header">
                    <div class="panel-header-left">
                        <h2 id="panel-nombre">Mi Negocio</h2>
                        <p id="panel-email" class="panel-email"></p>
                    </div>
                    <div class="panel-header-right">
                        <button class="btn-refresh" id="btn-refresh" title="Actualizar datos">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button class="btn-logout" id="btn-logout" title="Cerrar sesión">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- Tabs escritorio -->
                <div class="admin-tabs desktop-tabs">
                    <button class="tab-btn active" data-tab="pedidos">
                        <i class="fas fa-box"></i> Pedidos
                        <span class="tab-badge" id="badge-pedidos">0</span>
                    </button>
                    <button class="tab-btn" data-tab="productos">
                        <i class="fas fa-pizza-slice"></i> Productos
                        <span class="tab-badge" id="badge-productos">0</span>
                    </button>
                    <button class="tab-btn" data-tab="perfil">
                        <i class="fas fa-user-circle"></i> Perfil
                    </button>
                </div>

                <!-- Tab: Pedidos -->
                <div class="tab-content active" id="tab-pedidos">
                    <div class="filtros-mobile" id="filtros-mobile">
                        <button class="filtro-btn active" data-estado="preparando">
                            📦 Nuevos <span class="filtro-count" id="count-preparando">0</span>
                        </button>
                        <button class="filtro-btn" data-estado="en preparacion">
                            👨‍🍳 Preparación <span class="filtro-count" id="count-preparacion">0</span>
                        </button>
                        <button class="filtro-btn" data-estado="en camino">
                            🚚 En camino <span class="filtro-count" id="count-camino">0</span>
                        </button>
                        <button class="filtro-btn" data-estado="entregado">
                            ✅ Entregados <span class="filtro-count" id="count-entregado">0</span>
                        </button>
                    </div>
                    <div class="pedidos-container" id="pedidos-container">
                        <div class="loading"><div class="spinner"></div><p>Cargando pedidos...</p></div>
                    </div>
                </div>

                <!-- Tab: Productos -->
                <div class="tab-content" id="tab-productos">
                    <div class="productos-header-actions">
                        <button class="btn-primary btn-add-producto" id="btn-agregar-producto">
                            <i class="fas fa-plus"></i> Agregar producto
                        </button>
                    </div>
                    <div class="productos-admin-grid" id="productos-admin-grid">
                        <div class="loading"><div class="spinner"></div><p>Cargando productos...</p></div>
                    </div>
                </div>

                <!-- Tab: Perfil -->
                <div class="tab-content" id="tab-perfil">
                    <div class="perfil-container">
                        <div class="perfil-header">
                            <div class="perfil-avatar">
                                <i class="fas fa-store"></i>
                            </div>
                            <div class="perfil-info">
                                <h3 id="perfil-nombre-display"></h3>
                                <p id="perfil-email-display"></p>
                            </div>
                        </div>
                        <form id="perfil-form" class="perfil-form">
                            <div class="form-row">
                                <div class="form-group half">
                                    <label>Nombre del negocio</label>
                                    <input type="text" id="perfil-nombre" class="form-control">
                                </div>
                                <div class="form-group half">
                                    <label>Teléfono (WhatsApp)</label>
                                    <input type="tel" id="perfil-telefono" class="form-control">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Dirección</label>
                                <input type="text" id="perfil-direccion" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Horario de atención</label>
                                <input type="text" id="perfil-horario" class="form-control" placeholder="Ej: Lun a Dom 18-24hs">
                            </div>
                            <div class="form-group">
                                <label>Logo del negocio</label>
                                <div class="logo-upload-area">
                                    <input type="file" id="perfil-logo" accept="image/*" style="display: none;">
                                    <button type="button" class="btn-outline" id="btn-upload-logo">
                                        <i class="fas fa-cloud-upload-alt"></i> Subir logo
                                    </button>
                                    <div id="logo-preview" class="logo-preview"></div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Cambiar contraseña</label>
                                <input type="password" id="perfil-new-password" class="form-control" placeholder="Dejar vacío para no cambiar">
                            </div>
                            <button type="submit" class="btn-primary btn-save">
                                <i class="fas fa-save"></i> Guardar cambios
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
