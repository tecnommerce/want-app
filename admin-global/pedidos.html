<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Want | Todos los Pedidos</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='70' font-weight='bold' text-anchor='middle' fill='%23FF5A00'%3EW%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-global.css">
</head>
<body>
    <div class="admin-wrapper" id="admin-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Want<span class="logo-dot">.</span></h2>
                <p>Administrador</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="vendedores.html" class="nav-item" data-page="vendedores">
                    <i class="fas fa-store"></i> Vendedores
                </a>
                <a href="pedidos.html" class="nav-item active" data-page="pedidos">
                    <i class="fas fa-box"></i> Pedidos
                </a>
                <a href="productos.html" class="nav-item" data-page="productos">
                    <i class="fas fa-pizza-slice"></i> Productos
                </a>
                <a href="configuracion.html" class="nav-item" data-page="configuracion">
                    <i class="fas fa-cog"></i> Configuración
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" id="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="top-bar-info">
                    <span id="admin-name">Administrador</span>
                    <span class="badge">Global</span>
                </div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <h2>Todos los Pedidos</h2>
                    <div class="header-actions">
                        <div class="filtros">
                            <select id="filtro-vendedor">
                                <option value="">Todos los vendedores</option>
                            </select>
                            <select id="filtro-estado">
                                <option value="">Todos los estados</option>
                                <option value="preparando">Nuevos</option>
                                <option value="en preparacion">En preparación</option>
                                <option value="en camino">En camino</option>
                                <option value="entregado">Entregados</option>
                            </select>
                            <input type="date" id="filtro-fecha" placeholder="Fecha">
                        </div>
                        <button class="btn-export" id="export-pedidos">
                            <i class="fas fa-file-excel"></i> Exportar
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table" id="pedidos-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Fecha</th>
                                <th>Cliente</th>
                                <th>Vendedor</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Productos</th>
                            </tr>
                        </thead>
                        <tbody id="pedidos-tbody">
                            <tr><td colspan="7" class="loading-text">Cargando pedidos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin-global.js"></script>
</body>
</html>
