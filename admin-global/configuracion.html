<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Want | Configuración</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='70' font-weight='bold' text-anchor='middle' fill='%23FF5A00'%3EW%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-global.css">
</head>
<body>
    <div class="admin-wrapper" id="admin-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Want<span class="logo-dot">.</span></h2>
                <p>Administrador</p>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="vendedores.html" class="nav-item" data-page="vendedores">
                    <i class="fas fa-store"></i> Vendedores
                </a>
                <a href="pedidos.html" class="nav-item" data-page="pedidos">
                    <i class="fas fa-box"></i> Pedidos
                </a>
                <a href="productos.html" class="nav-item" data-page="productos">
                    <i class="fas fa-pizza-slice"></i> Productos
                </a>
                <a href="configuracion.html" class="nav-item active" data-page="configuracion">
                    <i class="fas fa-cog"></i> Configuración
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" id="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="top-bar-info">
                    <span id="admin-name">Administrador</span>
                    <span class="badge">Global</span>
                </div>
            </header>

            <div class="page-content">
                <div class="config-section">
                    <h2>Configuración de la Plataforma</h2>
                    
                    <div class="config-card">
                        <h3>Credenciales de Administrador</h3>
                        <form id="config-admin-form">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="config-email" placeholder="admin@want.com">
                            </div>
                            <div class="form-group">
                                <label>Nueva contraseña</label>
                                <div class="password-wrapper">
                                    <input type="password" id="config-password" placeholder="Dejar vacío para no cambiar">
                                    <button type="button" class="toggle-password" data-target="config-password">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Confirmar contraseña</label>
                                <div class="password-wrapper">
                                    <input type="password" id="config-password2" placeholder="Repetir nueva contraseña">
                                    <button type="button" class="toggle-password" data-target="config-password2">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary">Actualizar credenciales</button>
                        </form>
                    </div>

                    <div class="config-card">
                        <h3>Comisión de la plataforma</h3>
                        <form id="config-comision-form">
                            <div class="form-group">
                                <label>Porcentaje de comisión (%)</label>
                                <input type="number" id="config-comision" step="0.5" min="0" max="100">
                                <small>Este porcentaje se calculará sobre el total de cada pedido</small>
                            </div>
                            <button type="submit" class="btn-primary">Guardar comisión</button>
                        </form>
                    </div>

                    <div class="config-card">
                        <h3>Información de contacto</h3>
                        <form id="config-contacto-form">
                            <div class="form-group">
                                <label>Email de soporte</label>
                                <input type="email" id="config-soporte-email" placeholder="soporte@want.com">
                            </div>
                            <div class="form-group">
                                <label>WhatsApp de soporte</label>
                                <input type="tel" id="config-soporte-whatsapp" placeholder="5491112345678">
                            </div>
                            <button type="submit" class="btn-primary">Guardar contacto</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin-global.js"></script>
</body>
</html>
